<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio Web | En Construcción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sitio en Construcción</h1>
        <p>Desplegado con éxito en GitHub Pages. Estamos cocinando el código.</p>

        <div class="chart-container">
            <div class="chart-title">Estado del Proyecto</div>
            <div class="graph">
                <div class="bar" style="--target-height: 40%;" data-value="40%"></div>
                <div class="bar" style="--target-height: 75%;" data-value="75%"></div>
                <div class="bar" style="--target-height: 90%;" data-value="90%"></div>
            </div>
        </div>

        <button id="btn-interact">¿Quieres saber más?</button>
        <p id="hidden-message" class="hidden">¡Este mensaje aparece gracias a JavaScript externo!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
