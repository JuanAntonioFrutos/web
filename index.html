<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio Web | 2º Bachillerato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sitio en Construcción</h1>
        <p>Espacio dedicado a los contenidos y apuntes de 2º de Bachillerato.</p>

        <div class="chart-container">
            <div class="chart-title">Progreso del Curso</div>
            <div class="graph">
                <div class="bar" style="--target-height: 35%;" data-value="35%"></div>
                <div class="bar" style="--target-height: 60%;" data-value="60%"></div>
                <div class="bar" style="--target-height: 85%;" data-value="85%"></div>
            </div>
        </div>

        <button id="btn-interact" class="btn-main">¿Quieres saber más?</button>
        <p id="hidden-message" class="hidden">¡Mucho ánimo con el curso y la preparación de la EBAU/EvAU!</p>

        <hr class="separator">

        <h2 style="margin-bottom: 1rem; font-size: 1.5rem; color: #38bdf8;">Acceso a los Temas</h2>
        <div class="temas-container">
            <button class="btn-tema" onclick="window.location.href='temas2bach/tema1.html'">Tema 1</button>
            <button class="btn-tema" onclick="window.location.href='temas2bach/tema2.html'">Tema 2</button>
            <button class="btn-tema" onclick="window.location.href='temas2bach/tema3.html'">Tema 3</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
