<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ensayos Mecánicos de Materiales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background-color: #f8fafc; color: #0f172a; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        h2, h3 { color: #1e3a8a; margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background-color: #fff; }
        input:focus, select:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .flex-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .flex-child { flex: 1; min-width: 360px; }
        .panel-ensayo { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #f1f5f9; color: #1e293b; font-weight: 600; }
        .math-block { background: #f8fafc; font-family: 'Consolas', monospace; padding: 12px; border-radius: 6px; border-left: 4px solid #3b82f6; margin-top: 10px; font-size: 13px; white-space: pre-wrap; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        .btn-volver {
            background-color: #475569;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: background 0.2s;
}
.btn-volver:hover {
    background-color: #334155;
}
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h2 style="margin: 0; border: none;">Ensayos de materiales</h2>
    <button class="btn-volver" onclick="window.location.href='../../index.html'">← Volver al Índice</button>
    </div>
    <div class="grid" style="grid-template-columns: 1fr;">
        <div class="group">
            <label for="selectorEnsayo">Seleccione el Tipo de Ensayo Mecánico:</label>
            <select id="selectorEnsayo" onchange="conmutarEnsayo()">
                <option value="charpy">Péndulo de Charpy (Impacto)</option>
                <option value="brinell">Dureza Brinell (HB)</option>
                <option value="vickers">Dureza Vickers (HV)</option>
                <option value="rockwell">Dureza Rockwell (HR)</option>
                <option value="traccion">Ensayo de Tracción (Tensión-Deformación)</option>
            </select>
        </div>
    </div>

    <div id="panel-charpy" class="panel-ensayo">
        <div class="grid">
            <div class="group"><label>Masa del Martillo (m) [kg]:</label><input type="number" id="chMasa" value="22.5" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Longitud del Brazo (R) [m]:</label><input type="number" id="chBrazo" value="0.75" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Ángulo de Caída (α) [°]:</label><input type="number" id="chAnguloA" value="140" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Ángulo de Elevación (β) [°]:</label><input type="number" id="chAnguloB" value="75" oninput="calcularEnsayos()"></div>
        </div>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="group"><label>Ancho Probeta [mm]:</label><input type="number" id="chAncho" value="10" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Profundidad neta (bajo entalla) [mm]:</label><input type="number" id="chProf" value="8" oninput="closingValues(); calcularEnsayos()"></div>
        </div>
    </div>

    <div id="panel-brinell" class="panel-ensayo">
        <div class="grid">
            <div class="group"><label>Carga Aplicada (P) [kgf]:</label><input type="number" id="brCarga" value="3000" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Diámetro del Indentador (D) [mm]:</label><input type="number" id="brDiamI" value="10" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Diámetro de la Huella (d) [mm]:</label><input type="number" id="brDiamH" value="4.2" oninput="calcularEnsayos()"></div>
        </div>
    </div>

    <div id="panel-vickers" class="panel-ensayo">
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="group"><label>Carga Aplicada (P) [kgf]:</label><input type="number" id="viCarga" value="30" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Diagonal Media de la Huella (d) [mm]:</label><input type="number" id="viDiag" value="0.415" oninput="calcularEnsayos()"></div>
        </div>
    </div>

    <div id="panel-rockwell" class="panel-ensayo">
        <div class="grid">
            <div class="group">
                <label>Escala Rockwell:</label>
                <select id="roEscala" onchange="calcularEnsayos()">
                    <option value="HRC">Escala C (Cono de Diamante - Materiales Duros)</option>
                    <option value="HRB">Escala B (Esfera de 1/16" - Materiales Blandos)</option>
                </select>
            </div>
            <div class="group"><label>Profundidad Permanente Remanente (h) [mm]:</label><input type="number" id="roProf" value="0.062" step="0.001" oninput="calcularEnsayos()"></div>
        </div>
    </div>

    <div id="panel-traccion" class="panel-ensayo">
        <div class="grid">
            <div class="group">
                <label>Material de la Probeta:</label>
                <select id="trMaterial" onchange="cambiarMaterialTraccion()">
                    <option value="acero">Acero Estructural (A36)</option>
                    <option value="al">Aluminio de Alta Resistencia</option>
                    <option value="cobre">Cobre Recocido</option>
                </select>
            </div>
            <div class="group"><label>Diámetro Inicial (d₀) [mm]:</label><input type="number" id="trDiam" value="12.5" oninput="calcularEnsayos()"></div>
            <div class="group"><label>Longitud Calibrada Inicial (L₀) [mm]:</label><input type="number" id="trLong" value="50" oninput="calcularEnsayos()"></div>
        </div>
    </div>
</div>

<div class="flex-container">
    <div class="card flex-child" style="flex: 1.3;">
        <h2 id="tituloGrafica">Gráfica del Ensayo</h2>
        <div class="chart-container">
            <canvas id="canvasGrafica"></canvas>
        </div>
    </div>
    
    <div class="card flex-child" style="flex: 1;">
        <h2>Resultados Técnicos</h2>
        <table id="tablaVariables">
            <thead>
                <tr>
                    <th>Indicador</th>
                    <th>Valor Calculado</th>
                </tr>
            </thead>
            <tbody id="cuerpoResultados">
                </tbody>
        </table>

        <h3>Modelo Analítico y Memoria</h3>
        <div id="desgloseMatematico" class="math-block">-</div>
    </div>
</div>

<script>
let chartMecanico = null;

function conmutarEnsayo() {
    const panels = document.querySelectorAll('.panel-ensayo');
    panels.forEach(p => p.style.display = 'none');

    const tipo = document.getElementById('selectorEnsayo').value;
    document.getElementById(`panel-${tipo}`).style.display = 'block';

    calcularEnsayos();
}

function cambiarMaterialTraccion() {
    calcularEnsambleTraccion();
}

function calcularEnsayos() {
    const tipo = document.getElementById('selectorEnsayo').value;
    const cuerpo = document.getElementById('cuerpoResultados');
    const txtMat = document.getElementById('desgloseMatematico');
    
    let htmlRes = "";
    
    if (tipo === 'charpy') {
        document.getElementById('tituloGrafica').textContent = "Balance de Energía del Impacto";
        const m = parseFloat(document.getElementById('chMasa').value) || 0;
        const R = parseFloat(document.getElementById('chBrazo').value) || 0;
        const a_deg = parseFloat(document.getElementById('chAnguloA').value) || 0;
        const b_deg = parseFloat(document.getElementById('chAnguloB').value) || 0;
        const width = parseFloat(document.getElementById('chAncho').value) || 0;
        const prof = parseFloat(document.getElementById('chProf').value) || 0;
        
        const g = 9.80665;
        const rad = Math.PI / 180;
        
        let E_ini = m * g * R * (1 - Math.cos(a_deg * rad));
        let E_fin = m * g * R * (1 - Math.cos(b_deg * rad));
        let E_abs = E_ini - E_fin;
        if(E_abs < 0) E_abs = 0;

        let area_cm2 = (width * prof) / 100; 
        let resiliencia = area_cm2 > 0 ? E_abs / area_cm2 : 0;

        htmlRes = `<tr><td><b>Energía Inicial (E₀)</b></td><td>${E_ini.toFixed(2)} J</td></tr>
                   <tr><td><b>Energía Residual (E_f)</b></td><td>${E_fin.toFixed(2)} J</td></tr>
                   <tr style="background:#fef3c7;"><td><b>Energía Absorbida (ΔE)</b></td><td style="color:#b45309; font-weight:bold;">${E_abs.toFixed(2)} J</td></tr>
                   <tr><td><b>Sección de Rotura (A)</b></td><td>${area_cm2.toFixed(3)} cm²</td></tr>
                   <tr style="background:#dcfce7;"><td><b>Resiliencia (K)</b></td><td style="color:#15803d; font-weight:bold;">${resiliencia.toFixed(2)} J/cm²</td></tr>`;
        
        txtMat.innerHTML = `• E_absorbida = m·g·R·(cos(β) - cos(α))\n• K = E_absorbida / Area_neta\n\nDesarrollo numérico:\nΔE = ${m} kg · 9.81 m/s² · ${R} m · (cos(${b_deg}°) - cos(${140}°)) = ${E_abs.toFixed(2)} J`;
        cuerpo.innerHTML = htmlRes;
        
        renderizarGraficoBarras(['Energía Total Disp.', 'Energía Absorbida', 'Energía Restante'], [E_ini, E_abs, E_fin], 'Energía [Joules]', '#d97706');
    }
    else if (tipo === 'brinell') {
        document.getElementById('tituloGrafica').textContent = "Geometría de Carga Brinell";
        const P = parseFloat(document.getElementById('brCarga').value) || 0;
        const D = parseFloat(document.getElementById('brDiamI').value) || 1;
        const d = parseFloat(document.getElementById('brDiamH').value) || 0;

        let hb = 0;
        if (d < D && d > 0) {
            hb = (2 * P) / (Math.PI * D * (D - Math.sqrt(D * D - d * d)));
        }

        htmlRes = `<tr><td><b>Carga de Ensayo (P)</b></td><td>${P} kgf</td></tr>
                   <tr><td><b>Diámetro Bola (D)</b></td><td>${D} mm</td></tr>
                   <tr><td><b>Diámetro Huella (d)</b></td><td>${d} mm</td></tr>
                   <tr style="background:#e0f2fe;"><td><b>Dureza Brinell (HB)</b></td><td style="color:#0369a1; font-weight:bold;">${hb.toFixed(1)} HB</td></tr>`;
        
        txtMat.innerHTML = `• HB = 2P / [π·D·(D - √(D² - d²))]\n\nÁrea de la huella esférica:\nA = π·D·h = ${ (Math.PI*D*(D-Math.sqrt(D*D-d*d))/2).toFixed(2) } mm²`;
        cuerpo.innerHTML = htmlRes;

        renderizarGraficoBarras(['Diámetro Bola (D)', 'Diámetro Huella (d)'], [D, d], 'Dimensiones [mm]', '#2563eb');
    }
    else if (tipo === 'vickers') {
        document.getElementById('tituloGrafica').textContent = "Análisis de Microdureza Vickers";
        const P = parseFloat(document.getElementById('viCarga').value) || 0;
        const d = parseFloat(document.getElementById('viDiag').value) || 1;

        let hv = (1.8544 * P) / (d * d);

        htmlRes = `<tr><td><b>Carga Probeta (P)</b></td><td>${P} kgf</td></tr>
                   <tr><td><b>Diagonal de Huella (d)</b></td><td>${d} mm</td></tr>
                   <tr style="background:#f3e8ff;"><td><b>Dureza Vickers (HV)</b></td><td style="color:#6b21a8; font-weight:bold;">${hv.toFixed(1)} HV</td></tr>`;
        
        txtMat.innerHTML = `• HV = 1.8544 · P / d²\n\nEl factor 1.8544 proviene de la relación geométrica de las caras del diamante piramidal a 136°.`;
        cuerpo.innerHTML = htmlRes;

        renderizarGraficoBarras(['Diagonal Medida (d * 10)'], [d * 10], 'Escala Ampliada [mm x10]', '#9333ea');
    }
    else if (tipo === 'rockwell') {
        document.getElementById('tituloGrafica').textContent = "Penetración de Huella Rockwell";
        const escala = document.getElementById('roEscala').value;
        const h = parseFloat(document.getElementById('roProf').value) || 0;

        let e = h / 0.002;
        let hr = escala === 'HRC' ? 100 - e : 130 - e;

        htmlRes = `<tr><td><b>Escala Activa</b></td><td>Rockwell ${escala.substring(2)}</td></tr>
                   <tr><td><b>Profundidad neta (h)</b></td><td>${h} mm</td></tr>
                   <tr><td><b>Unidades de penetración (e)</b></td><td>${e.toFixed(1)} div</td></tr>
                   <tr style="background:#f0fdf4;"><td><b>Valor Dureza (HR)</b></td><td style="color:#16a34a; font-weight:bold;">${hr.toFixed(1)} ${escala}</td></tr>`;
        
        txtMat.innerHTML = escala === 'HRC' ? `• HRC = 100 - (h / 0.002)\n\nCada división representa un desplazamiento del durómetro de 2 micrómetros.` : `• HRB = 130 - (h / 0.002)`;
        cuerpo.innerHTML = htmlRes;

        renderizarGraficoBarras(['Profundidad h (μm)'], [h * 1000], 'Desplazamiento Micrométrico [μm]', '#16a34a');
    }
    else if (tipo === 'traccion') {
        document.getElementById('tituloGrafica').textContent = "Curva Esfuerzo - Deformación Uniaxial";
        calcularEnsambleTraccion();
    }
}

function renderizarGraficoBarras(labels, datos, etiquetaEje, colorHex) {
    const ctx = document.getElementById('canvasGrafica').getContext('2d');
    if (chartMecanico) chartMecanico.destroy();

    chartMecanico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: etiquetaEje,
                data: datos,
                backgroundColor: colorHex,
                borderWidth: 0,
                barThickness: 40
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

function calcularEnsambleTraccion() {
    const mat = document.getElementById('trMaterial').value;
    const d0 = parseFloat(document.getElementById('trDiam').value) || 1;
    const L0 = parseFloat(document.getElementById('trLong').value) || 1;
    
    const Area0 = (Math.PI * Math.pow(d0, 2)) / 4; // mm²

    // Propiedades mecánicas empíricas de simulación por material
    let E, Sy, Su, e_fractura;
    if (mat === 'acero') {
        E = 200000; Sy = 250; Su = 400; e_fractura = 0.25; // Aceros dulces
    } else if (mat === 'al') {
        E = 70000;  Sy = 280; Su = 310; e_fractura = 0.12;
    } else {
        E = 110000; Sy = 70;  Su = 220; e_fractura = 0.40; // Cobre
    }

    // Construcción de puntos discretos de la curva real de tracción
    let puntosCurva = [];
    
    // 1. Tramo Elástico (Ley de Hooke)
    let def_elastica = Sy / E;
    puntosCurva.push({x: 0, y: 0});
    puntosCurva.push({x: def_elastica * 0.5, y: Sy * 0.5});
    puntosCurva.push({x: def_elastica, y: Sy});

    // 2. Tramo de Fluencia y Endurecimiento por Deformación (Plástico)
    let pasosPlasticos = 10;
    for(let i = 1; i <= pasosPlasticos; i++){
        let frac = i / pasosPlasticos;
        let def_p = def_elastica + (e_fractura * 0.7 - def_elastica) * frac;
        // Aproximación parabólica del domo de tensión máxima
        let esfuerzo_p = Sy + (Su - Sy) * Math.sin(frac * Math.PI / 2);
        puntosCurva.push({x: def_p, y: esfuerzo_p});
    }

    // 3. Estricción y rotura
    puntosCurva.push({x: e_fractura * 0.85, y: Su * 0.95});
    puntosCurva.push({x: e_fractura, y: Su * 0.82});

    const F_fluencia = (Sy * Area0) / 1000; // kN
    const F_maxima = (Su * Area0) / 1000; // kN

    document.getElementById('cuerpoResultados').innerHTML = `
        <tr><td><b>Área Inicial Probeta (A₀)</b></td><td>${Area0.toFixed(2)} mm²</td></tr>
        <tr><td><b>Módulo Elástico (E)</b></td><td>${(E/1000).toFixed(0)} GPa</td></tr>
        <tr style="background:#fef3c7;"><td><b>Límite Elástico (σ_y)</b></td><td style="color:#b45309; font-weight:bold;">${Sy} MPa</td></tr>
        <tr style="background:#fee2e2;"><td><b>Carga de Fluencia Estimada</b></td><td style="color:#dc2626;">${F_fluencia.toFixed(2)} kN</td></tr>
        <tr style="background:#e0f2fe;"><td><b>Resistencia UTS (σ_u)</b></td><td style="color:#0369a1; font-weight:bold;">${Su} MPa</td></tr>
        <tr><td><b>Carga de Rotura Máxima</b></td><td>${F_maxima.toFixed(2)} kN</td></tr>
    `;

    document.getElementById('desgloseMatematico').innerHTML = `• Esfuerzo Ingenieril (σ) = F / A₀\n• Deformación Unitaria (ε) = ΔL / L₀\n• Zona Elástica: σ = E · ε\n\nEl material rompe al alcanzar una deformación del ${(e_fractura*100).toFixed(0)}% de su longitud libre original.`;

    // Renderizado del Diagrama de Tracción
    const ctx = document.getElementById('canvasGrafica').getContext('2d');
    if (chartMecanico) chartMecanico.destroy();

    chartMecanico = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Curva σ - ε',
                data: puntosCurva,
                borderColor: '#dc2626',
                borderWidth: 3,
                showLine: true,
                pointRadius: 1,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { type: 'linear', title: { display: true, text: 'Deformación Unitaria (mm/mm)' } },
                y: { type: 'linear', title: { display: true, text: 'Esfuerzo Tecnológico (MPa)' } }
            }
        }
    });
}

window.onload = function() {
    conmutarEnsayo();
};
</script>

</body>
</html>
